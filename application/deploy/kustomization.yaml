apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orders-poc

resources:
  - namespace.yaml
  - secret-orders-db.yaml
  - rbac-argocd-workload.yaml
  - deployment.yaml
  - service.yaml
  - route.yaml

labels:
  - pairs:
      app.kubernetes.io/name: orders-api
      app.kubernetes.io/component: api

configMapGenerator:
  - name: orders-api-config
    literals:
      - PGHOST=3.134.95.130
      - PGPORT=5432
      - PGDATABASE=appdb
      - PGUSER=appuser
      - PGSSLMODE=disable
      - PGCONNECT_TIMEOUT=15
      - PG_POOL_CONNECT_RETRIES=30
      - PG_POOL_CONNECT_DELAY_SEC=4

# Internal registry image (no tag in newName; newTag supplies the tag).
images:
  - name: orders-api
    newName: image-registry.openshift-image-registry.svc:5000/orders-poc/orders-api #This should be passed on an Ansible Survey later on
    newTag: latest #This should be passed on an Ansible Survey later on
