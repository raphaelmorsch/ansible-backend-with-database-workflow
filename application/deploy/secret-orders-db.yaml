# Placeholder so the Deployment can mount PGPASSWORD before you set a real password.
# Replace the value out-of-band (recommended):
#   oc patch secret orders-db -n orders-poc -p '{"stringData":{"password":"YOUR_REAL_PASSWORD"}}' --type=merge
#
# The Argo CD Application uses ignoreDifferences on this Secret so sync/selfHeal
# does not revert your patched password back to the placeholder.
apiVersion: v1
kind: Secret
metadata:
  name: orders-db
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
type: Opaque
stringData:
 password: "ChangeMe123!"
