# Copy to secret.yaml (do not commit real credentials), apply once per cluster/namespace:
#   oc create secret generic orders-db --from-literal=password='YOUR_PG_PASSWORD' -n orders-poc
#
# Or apply a local file (gitignored):
#   oc apply -f secret.yaml -n orders-poc
apiVersion: v1
kind: Secret
metadata:
  name: orders-db
  namespace: orders-poc
type: Opaque
stringData:
  password: "REPLACE_ME"
