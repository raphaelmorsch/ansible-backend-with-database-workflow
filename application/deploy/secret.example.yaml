# Optional: the repo now ships secret-orders-db.yaml (placeholder) via Argo CD.
# To set the real password without storing it in Git:
#   oc patch secret orders-db -n orders-poc -p '{"stringData":{"password":"YOUR_PG_PASSWORD"}}' --type=merge
#
# (Argo CD Application should ignoreDifferences on Secret /data so sync does not revert.)
apiVersion: v1
kind: Secret
metadata:
  name: orders-db
  namespace: orders-poc
type: Opaque
stringData:
  password: "REPLACE_ME"
