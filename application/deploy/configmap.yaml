apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-api-config
data:
  # PostgreSQL outside the cluster (adjust if your host changes).
 PGHOST: "3.21.125.7"
 PGPORT: "5432"
 PGDATABASE: "appdb"
 PGUSER: "appuser"
  # asyncpg: use require when Postgres has TLS; default disable for plain Postgres.
  PGSSLMODE: "disable"
