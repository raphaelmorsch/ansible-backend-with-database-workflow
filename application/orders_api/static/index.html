<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orders</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-dim: #2563c4;
      --danger: #e85d6c;
      --ok: #3ecf8e;
      --radius: 10px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: linear-gradient(165deg, #0c1018 0%, var(--bg) 40%, #121a26 100%);
      color: var(--text);
      line-height: 1.45;
    }
    a { color: var(--accent); }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(26, 35, 50, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header nav { font-size: 0.875rem; color: var(--muted); }
    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    #banner {
      display: none;
      padding: 0.65rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    #banner.err { display: block; background: rgba(232, 93, 108, 0.15); border: 1px solid var(--danger); color: #ffb4bc; }
    #banner.ok { display: block; background: rgba(62, 207, 142, 0.12); border: 1px solid var(--ok); color: #9aebc0; }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    @media (min-width: 880px) {
      .grid { grid-template-columns: 1fr 340px; align-items: start; }
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }
    .card h2 { margin: 0 0 1rem; font-size: 1rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input, textarea {
      width: 100%;
      margin-bottom: 0.9rem;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #121a26;
      color: var(--text);
      font: inherit;
    }
    textarea { min-height: 72px; resize: vertical; }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.2);
    }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    button {
      font: inherit;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      padding: 0.5rem 1rem;
      font-weight: 500;
      font-size: 0.9rem;
    }
    button.primary { background: var(--accent); color: #fff; }
    button.primary:hover { background: var(--accent-dim); }
    button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    button.ghost:hover { color: var(--text); border-color: var(--muted); }
    button.danger { background: transparent; color: var(--danger); border: 1px solid rgba(232, 93, 108, 0.45); }
    button.danger:hover { background: rgba(232, 93, 108, 0.12); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.65rem 0.5rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: none; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted); font-size: 0.8rem; }
    .empty { color: var(--muted); padding: 2rem 1rem; text-align: center; }
    .actions { white-space: nowrap; }
    .actions button { padding: 0.35rem 0.65rem; font-size: 0.8rem; margin-right: 0.35rem; }
    footer { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <h1>Orders</h1>
    <nav><a href="/docs">OpenAPI (Swagger)</a> · <a href="/health">Health</a></nav>
  </header>
  <main>
    <div id="banner" role="alert"></div>
    <div class="grid">
      <section class="card">
        <h2>All orders</h2>
        <div id="table-wrap"></div>
      </section>
      <section class="card">
        <h2 id="form-title">New order</h2>
        <form id="order-form">
          <input type="hidden" id="edit-id" value="" />
          <label for="customer_name">Customer</label>
          <input id="customer_name" name="customer_name" autocomplete="name" required maxlength="256" />
          <label for="item_description">Item</label>
          <textarea id="item_description" name="item_description" required maxlength="512"></textarea>
          <label for="quantity">Quantity</label>
          <input id="quantity" name="quantity" type="number" min="1" value="1" required />
          <div class="row">
            <button type="submit" class="primary" id="submit-btn">Save</button>
            <button type="button" class="ghost" id="reset-btn">Clear</button>
          </div>
        </form>
      </section>
    </div>
  </main>
  <footer>Orders PoC · same-origin API</footer>
  <script>
    const banner = document.getElementById("banner");
    const tableWrap = document.getElementById("table-wrap");
    const form = document.getElementById("order-form");
    const editId = document.getElementById("edit-id");
    const formTitle = document.getElementById("form-title");
    const submitBtn = document.getElementById("submit-btn");

    function showBanner(kind, msg) {
      banner.className = kind;
      banner.textContent = msg;
    }
    function clearBanner() {
      banner.className = "";
      banner.textContent = "";
    }

    async function api(path, opts = {}) {
      const r = await fetch(path, {
        headers: { "Content-Type": "application/json", ...opts.headers },
        ...opts,
      });
      const text = await r.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) {}
      if (!r.ok) {
        const detail = data && (data.detail || data.message) ? JSON.stringify(data.detail || data.message) : text || r.statusText;
        throw new Error(detail);
      }
      return data;
    }

    function fmtDate(iso) {
      try { return new Date(iso).toLocaleString(); } catch (_) { return iso; }
    }

    async function loadOrders() {
      clearBanner();
      const orders = await api("/orders");
      if (!orders.length) {
        tableWrap.innerHTML = '<p class="empty">No orders yet. Add one on the right.</p>';
        return;
      }
      const rows = orders.map((o) => `
        <tr>
          <td class="num">${o.id}</td>
          <td>${escapeHtml(o.customer_name)}</td>
          <td>${escapeHtml(o.item_description)}</td>
          <td class="num">${o.quantity}</td>
          <td class="muted">${fmtDate(o.created_at)}</td>
          <td class="actions">
            <button type="button" class="ghost" data-edit="${o.id}">Edit</button>
            <button type="button" class="danger" data-del="${o.id}">Delete</button>
          </td>
        </tr>
      `).join("");
      tableWrap.innerHTML = `
        <table>
          <thead><tr>
            <th class="num">#</th><th>Customer</th><th>Item</th><th class="num">Qty</th><th>Created</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      tableWrap.querySelectorAll("[data-edit]").forEach((btn) => {
        btn.addEventListener("click", () => startEdit(+btn.getAttribute("data-edit"), orders));
      });
      tableWrap.querySelectorAll("[data-del]").forEach((btn) => {
        btn.addEventListener("click", () => removeOrder(+btn.getAttribute("data-del")));
      });
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function startEdit(id, orders) {
      const o = orders.find((x) => x.id === id);
      if (!o) return;
      editId.value = String(o.id);
      formTitle.textContent = "Edit order #" + o.id;
      submitBtn.textContent = "Update";
      document.getElementById("customer_name").value = o.customer_name;
      document.getElementById("item_description").value = o.item_description;
      document.getElementById("quantity").value = o.quantity;
      form.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function resetForm() {
      editId.value = "";
      formTitle.textContent = "New order";
      submitBtn.textContent = "Save";
      form.reset();
      document.getElementById("quantity").value = "1";
    }

    document.getElementById("reset-btn").addEventListener("click", resetForm);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearBanner();
      const customer_name = document.getElementById("customer_name").value.trim();
      const item_description = document.getElementById("item_description").value.trim();
      const quantity = parseInt(document.getElementById("quantity").value, 10);
      const id = editId.value;
      try {
        if (id) {
          await api("/orders/" + id, {
            method: "PUT",
            body: JSON.stringify({ customer_name, item_description, quantity }),
          });
          showBanner("ok", "Order updated.");
        } else {
          await api("/orders", {
            method: "POST",
            body: JSON.stringify({ customer_name, item_description, quantity }),
          });
          showBanner("ok", "Order created.");
        }
        resetForm();
        await loadOrders();
      } catch (err) {
        showBanner("err", err.message || String(err));
      }
    });

    async function removeOrder(id) {
      if (!confirm("Delete order #" + id + "?")) return;
      clearBanner();
      try {
        await api("/orders/" + id, { method: "DELETE" });
        showBanner("ok", "Order deleted.");
        resetForm();
        await loadOrders();
      } catch (err) {
        showBanner("err", err.message || String(err));
      }
    }

    loadOrders().catch((err) => {
      showBanner("err", "Could not load orders: " + (err.message || err));
      tableWrap.innerHTML = '<p class="empty">Failed to reach API.</p>';
    });
  </script>
</body>
</html>
