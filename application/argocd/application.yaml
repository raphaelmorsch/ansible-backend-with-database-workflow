# Apply from the repo root (adjust namespace if you use upstream Argo CD in `argocd`):
#   oc apply -f application/argocd/application.yaml -n openshift-gitops
#
# The Application metadata.namespace below is openshift-gitops; change it to `argocd`
# if that is where your Argo CD server runs.
# Update repoURL and targetRevision to match this repository.
#
# Git includes a placeholder Secret; patch the real DB password after first sync:
#   oc patch secret orders-db -n orders-poc -p '{"stringData":{"password":"..."}}' --type=merge
#
# Ensure your external PostgreSQL allows connections from the OpenShift cluster
# egress (security groups / firewall / pg_hba.conf).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders-api-poc
  namespace: openshift-gitops
spec:
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: orders-db
      jsonPointers:
        - /data
  project: default
  source:
    repoURL: https://github.com/raphaelmorsch/ansible-backend-with-database-workflow.git
    targetRevision: main
    path: application/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: orders-poc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
