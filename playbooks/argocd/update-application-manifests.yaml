---
- name: JT06 - Update GitOps repo with DB connection (Kustomize)
  hosts: localhost
  gather_facts: false

  vars:
    repo_url: "github.com/raphaelmorsch/ansible-backend-with-database-workflow.git"
    repo_dir: "/tmp/ansible-backend-with-database-workflow"
    git_branch: "main"

    kustomization_path: "{{ repo_dir }}/application/deploy/kustomization.yaml"
    secret_path: "{{ repo_dir }}/application/deploy/secret-orders-db.yaml"

  tasks:
    - name: Remove previous repo clone
      ansible.builtin.file:
        path: "{{ repo_dir }}"
        state: absent

    - name: Clone repository
      ansible.builtin.git:
        repo: "https://{{ git_username }}:{{ git_token }}@{{ repo_url }}"
        dest: "{{ repo_dir }}"
        version: "{{ git_branch }}"

    # 🔥 Atualiza o kustomization.yaml via template (fonte da verdade) teste
    - name: Render kustomization.yaml with DB data
      ansible.builtin.template:
        src: kustomization.yaml.j2
        dest: "{{ kustomization_path }}"

    # 🔐 Atualiza senha no Secret
    - name: Update database password Secret
      ansible.builtin.lineinfile:
        path: "{{ secret_path }}"
        regexp: '^\s*password:'
        line: '  password: "{{ db_password }}"'

    # ✅ Validação YAML (evita quebrar ArgoCD)
    - name: Validate YAML syntax
      ansible.builtin.command:
        cmd: python3 -c "import yaml; yaml.safe_load(open('{{ item }}'))"
      loop:
        - "{{ kustomization_path }}"
        - "{{ secret_path }}"
      changed_when: false

    - name: Configure git user
      ansible.builtin.shell: |
        git config user.name "AAP Automation"
        git config user.email "aap-automation@example.com"
      args:
        chdir: "{{ repo_dir }}"

    - name: Check git diff
      ansible.builtin.command: git diff
      args:
        chdir: "{{ repo_dir }}"
      register: git_diff
      changed_when: false

    - name: Show diff (demo friendly)
      ansible.builtin.debug:
        var: git_diff.stdout_lines

    - name: Commit changes
      ansible.builtin.shell: |
        git add .
        git commit -m "JT06 - Update DB connection via AAP"
      args:
        chdir: "{{ repo_dir }}"
      register: git_commit
      failed_when: git_commit.rc not in [0, 1]
      changed_when: git_commit.rc == 0

    - name: Push changes
      ansible.builtin.command: git push origin "{{ git_branch }}"
      args:
        chdir: "{{ repo_dir }}"
      when: git_commit.rc == 0

    - name: Save workflow status
      ansible.builtin.set_stats:
        data:
          app_gitops_updated: "{{ git_commit.rc == 0 }}"
          app_namespace: "orders-poc"
        per_host: false

    - name: Update ticket - GitOps step
      ansible.builtin.uri:
        url: "http://ticket-itsm.apps.cluster-v8jc8.dynamic.redhatworkshops.io/tickets/{{ itsm_ticket_id }}"
        method: PATCH
        body_format: json
        body:
          status: "IN_PROGRESS"
          comment: "GitOps updated. ArgoCD syncing application."
