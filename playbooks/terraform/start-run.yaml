---
- name: Trigger Terraform Enterprise from AAP
  hosts: localhost
  gather_facts: false

  vars:
    vm_name: "demo-db-{{ lookup('pipe','date +%s') }}"

  tasks:
    - name: Get Workspace ID
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/organizations/{{ tf_org }}/workspaces/{{ tf_workspace }}"
        method: GET
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
      register: workspace_info

    - name: Set workspace_id
      ansible.builtin.set_fact:
        workspace_id: "{{ workspace_info.json.data.id }}"

    - name: Get workspace variables
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/workspaces/{{ workspace_id }}/vars"
        method: GET
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
      register: workspace_vars

    - name: Set vm_name variable id if it exists
      ansible.builtin.set_fact:
        vm_name_var_id: "{{ item.id }}"
      loop: "{{ workspace_vars.json.data }}"
      when:
        - item.attributes.key == "vm_name"
        - item.attributes.category == "terraform"

    - name: Create vm_name variable if it does not exist
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/workspaces/{{ workspace_id }}/vars"
        method: POST
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
        body_format: json
        body:
          data:
            type: vars
            attributes:
              key: "vm_name"
              value: "{{ vm_name }}"
              category: "terraform"
              hcl: false
              sensitive: false
        status_code: [200, 201]
      when: vm_name_var_id is not defined

    - name: Update existing vm_name variable
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/workspaces/{{ workspace_id }}/vars/{{ vm_name_var_id }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
        body_format: json
        body:
          data:
            id: "{{ vm_name_var_id }}"
            type: vars
            attributes:
              key: "vm_name"
              value: "{{ vm_name }}"
              category: "terraform"
              hcl: false
              sensitive: false
        status_code: [200]
      when: vm_name_var_id is defined

    - name: Start Terraform run
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/runs"
        method: POST
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
        body_format: json
        body:
          data:
            type: runs
            attributes:
              message: "AAP triggered run for {{ vm_name }}"
              replace-addrs:
                - "aws_instance.db"
            relationships:
              workspace:
                data:
                  type: workspaces
                  id: "{{ workspace_id }}"
        status_code: [200, 201]
      register: run_response

    - name: Set run_id
      ansible.builtin.set_fact:
        run_id: "{{ run_response.json.data.id }}"

    - name: Wait for Terraform run to finish
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/runs/{{ run_id }}"
        method: GET
        headers:
          Authorization: "Bearer {{ tf_token }}"
      register: run_status
      until: run_status.json.data.attributes.status in ["applied", "planned_and_finished"]
      retries: 60
      delay: 10

    - name: Fail if Terraform run did not apply
      ansible.builtin.fail:
        msg: "Terraform run finished with status {{ run_status.json.data.attributes.status }}"
      when: run_status.json.data.attributes.status not in ["applied", "planned_and_finished"]

    - name: Show result
      ansible.builtin.debug:
        msg:
          - "Terraform run completed successfully"
          - "Run ID: {{ run_id }}"
          - "VM name requested: {{ vm_name }}"