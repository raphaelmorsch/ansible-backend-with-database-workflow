---
- name: Trigger Terraform Enterprise VM creation from AAP
  hosts: localhost
  gather_facts: false

  vars:
    vm_name: "demo-db-{{ lookup('pipe','date +%s') }}"

  tasks:
    - name: Get Workspace ID
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/organizations/{{ tf_org }}/workspaces/{{ tf_workspace }}"
        method: GET
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
      register: workspace_info

    - name: Set workspace_id
      ansible.builtin.set_fact:
        workspace_id: "{{ workspace_info.json.data.id }}"

    - name: Get workspace variables
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/workspaces/{{ workspace_id }}/vars?page%5Bsize%5D=100"
        method: GET
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
      register: workspace_vars

    - name: Get vm_name variable id
      ansible.builtin.set_fact:
        vm_name_var_id: "{{ item.id }}"
      loop: "{{ workspace_vars.json.data }}"
      when:
        - item.attributes.key == "vm_name"
        - item.attributes.category == "terraform"

    - name: Get aws_key_name variable id
      ansible.builtin.set_fact:
        aws_key_name_var_id: "{{ item.id }}"
      loop: "{{ workspace_vars.json.data }}"
      when:
        - item.attributes.key == "aws_key_name"
        - item.attributes.category == "terraform"

    - name: Fail if required variables are missing
      ansible.builtin.fail:
        msg: "Missing vm_name or aws_key_name variable in TFE workspace"
      when: vm_name_var_id is not defined or aws_key_name_var_id is not defined

    - name: Update vm_name variable
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/workspaces/{{ workspace_id }}/vars/{{ vm_name_var_id }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
        body_format: json
        body:
          data:
            id: "{{ vm_name_var_id }}"
            type: vars
            attributes:
              value: "{{ vm_name }}"
        status_code: [200]

    - name: Update aws_key_name variable
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/workspaces/{{ workspace_id }}/vars/{{ aws_key_name_var_id }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
        body_format: json
        body:
          data:
            id: "{{ aws_key_name_var_id }}"
            type: vars
            attributes:
              value: "{{ key_name }}"
        status_code: [200]

    - name: Start Terraform run
      ansible.builtin.uri:
        url: "{{ tf_hostname }}/api/v2/runs"
        method: POST
        headers:
          Authorization: "Bearer {{ tf_token }}"
          Content-Type: "application/vnd.api+json"
        body_format: json
        body:
          data:
            type: runs
            attributes:
              message: "AAP triggered run for {{ vm_name }}"
              replace-addrs:
                - "aws_instance.db"
            relationships:
              workspace:
                data:
                  type: workspaces
                  id: "{{ workspace_id }}"
        status_code: [201]
      register: run_response

    - name: Set run_id
      ansible.builtin.set_fact:
        run_id: "{{ run_response.json.data.id }}"

    - name: Save VM name as artifact
      ansible.builtin.set_stats:
        data:
          vm_name: "{{ vm_name }}"
          run_id: "{{ run_id }}"
        per_host: false

    - name: Show Terraform run info
      ansible.builtin.debug:
        msg:
          - "Run ID: {{ run_id }}"
          - "VM Name: {{ vm_name }}"
          - "AWS Key Name: {{ key_name }}"