---
- name: Prepare SSH access
  hosts: localhost
  gather_facts: false

  vars:
    key_path: "/tmp/runtime_key"

  tasks:
    - name: Write private key to file
      ansible.builtin.copy:
        content: "{{ ssh_private_key }}"
        dest: "{{ key_path }}"
        mode: "0600"

    - name: Add DB VM to inventory
      ansible.builtin.add_host:
        name: db_vm
        groups: db
        ansible_host: "{{ db_vm_public_ip }}"
        ansible_user: "{{ db_vm_user }}"
        ansible_ssh_private_key_file: "{{ key_path }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

- name: Configure PostgreSQL
  hosts: db
  become: true
  gather_facts: false

  vars:
    db_name: appdb
    db_user: appuser
    db_password: "ChangeMe123!"

  tasks:
    - name: Wait until SSH is fully usable
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 20

    - name: Wait for cloud-init to finish
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: false

    - name: Collect memory before install
      ansible.builtin.command: free -m
      register: memory_before
      changed_when: false
      failed_when: false

    - name: Show memory before install
      ansible.builtin.debug:
        var: memory_before.stdout_lines

    - name: Debug dnf install manually
      ansible.builtin.command:
        cmd: dnf -v -y install postgresql-server
      register: dnf_debug
      failed_when: false

    - name: Show dnf return code
      ansible.builtin.debug:
        var: dnf_debug.rc

    - name: Show dnf stdout
      ansible.builtin.debug:
        var: dnf_debug.stdout_lines

    - name: Show dnf stderr
      ansible.builtin.debug:
        var: dnf_debug.stderr_lines

    - name: Collect dnf and system logs
      ansible.builtin.shell: |
        echo "===== /var/log/dnf.log ====="
        tail -n 100 /var/log/dnf.log || true
        echo "===== /var/log/dnf.rpm.log ====="
        tail -n 100 /var/log/dnf.rpm.log || true
        echo "===== dmesg ====="
        dmesg | tail -n 80 || true
        echo "===== memory after dnf ====="
        free -m || true
      register: dnf_logs
      changed_when: false
      failed_when: false

    - name: Show dnf/system logs
      ansible.builtin.debug:
        var: dnf_logs.stdout_lines

    - name: Fail if dnf install failed
      ansible.builtin.fail:
        msg: "dnf install failed with rc={{ dnf_debug.rc }}"
      when: dnf_debug.rc != 0

    - name: Initialize database
      ansible.builtin.command: postgresql-setup --initdb
      args:
        creates: /var/lib/pgsql/data/postgresql.conf

    - name: Configure listen_addresses
      ansible.builtin.lineinfile:
        path: /var/lib/pgsql/data/postgresql.conf
        regexp: "^#?listen_addresses"
        line: "listen_addresses = '*'"

    - name: Allow remote access
      ansible.builtin.lineinfile:
        path: /var/lib/pgsql/data/pg_hba.conf
        line: "host all all 0.0.0.0/0 md5"
        insertafter: EOF

    - name: Start PostgreSQL
      ansible.builtin.service:
        name: postgresql
        state: restarted
        enabled: true

    - name: Check if database exists
      ansible.builtin.shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1
      register: db_exists
      failed_when: false
      changed_when: false

    - name: Create DB if not exists
      ansible.builtin.command: >
        sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};"
      when: db_exists.rc != 0

    - name: Check if user exists
      ansible.builtin.shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_user }}'" | grep -q 1
      register: user_exists
      failed_when: false
      changed_when: false

    - name: Create DB user if not exists
      ansible.builtin.command: >
        sudo -u postgres psql -c "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}';"
      when: user_exists.rc != 0

    - name: Grant privileges
      ansible.builtin.command: >
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_user }};"

    - name: Save DB connection info as artifacts
      ansible.builtin.set_stats:
        data:
          db_host: "{{ db_vm_public_ip }}"
          db_port: "5432"
          db_name: "{{ db_name }}"
          db_user: "{{ db_user }}"
          db_password: "{{ db_password }}"
        per_host: false

    - name: Show DB info
      ansible.builtin.debug:
        msg:
          - "DB Host: {{ db_vm_public_ip }}"
          - "DB Port: 5432"
          - "DB Name: {{ db_name }}"
          - "DB User: {{ db_user }}"