---
- name: Configure PostgreSQL
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Add host dynamically
      add_host:
        name: db_vm
        groups: db
        ansible_host: "{{ db_vm_public_ip }}"
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "/tmp/runtime_key"

    - name: Write private key to file
      copy:
        content: "{{ ssh_private_key }}"
        dest: /tmp/runtime_key
        mode: '0600'

- name: Install PostgreSQL
  hosts: db
  become: true

  tasks:
    - name: Install PostgreSQL
      dnf:
        name: postgresql-server
        state: present