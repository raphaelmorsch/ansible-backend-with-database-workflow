---
- name: Generate SSH key pair
  hosts: localhost
  gather_facts: false

  vars:
    key_name: "aap-demo-{{ lookup('pipe','date +%s') }}"
    key_dir: "/tmp/aap-keys"
    key_path: "{{ key_dir }}/{{ key_name }}"

  tasks:
    - name: Ensure key directory exists
      ansible.builtin.file:
        path: "{{ key_dir }}"
        state: directory
        mode: "0700"

    - name: Check ssh-keygen exists
      ansible.builtin.command: which ssh-keygen
      register: ssh_keygen_check
      changed_when: false

    - name: Generate SSH key pair
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -t
          - rsa
          - -b
          - "2048"
          - -f
          - "{{ key_path }}"
          - -N
          - ""
      register: keygen_result
      changed_when: keygen_result.rc == 0

    - name: Show ssh-keygen result
      ansible.builtin.debug:
        var: keygen_result

    - name: Check generated private key
      ansible.builtin.stat:
        path: "{{ key_path }}"
      register: private_key_stat

    - name: Fail if private key was not generated
      ansible.builtin.fail:
        msg: "Private key was not generated at {{ key_path }}. ssh-keygen result: {{ keygen_result }}"
      when: not private_key_stat.stat.exists

    - name: Read private key
      ansible.builtin.slurp:
        src: "{{ key_path }}"
      register: private_key

    - name: Read public key
      ansible.builtin.slurp:
        src: "{{ key_path }}.pub"
      register: public_key

    - name: Save SSH key pair as workflow artifacts
      ansible.builtin.set_stats:
        data:
          key_name: "{{ key_name }}"
          ssh_private_key: "{{ private_key.content | b64decode }}"
          ssh_public_key: "{{ public_key.content | b64decode }}"
        per_host: false

    - name: Show key name
      ansible.builtin.debug:
        msg: "Generated key pair {{ key_name }}"