---
- name: Generate SSH key pair
  hosts: localhost
  gather_facts: false

  vars:
    key_dir: "/tmp/aap-keys"

  tasks:
    - name: Set key name once
      ansible.builtin.set_fact:
        key_name: "aap-demo-{{ lookup('pipe','date +%s') }}"
        key_path: "{{ key_dir }}/aap-demo-{{ lookup('pipe','date +%s') }}"

    - name: Ensure key directory exists
      ansible.builtin.file:
        path: "{{ key_dir }}"
        state: directory
        mode: "0700"

    - name: Generate SSH key pair
      ansible.builtin.command:
        argv:
          - /usr/bin/ssh-keygen
          - -t
          - rsa
          - -b
          - "2048"
          - -f
          - "{{ key_path }}"
          - -N
          - ""
      register: keygen_result

    - name: Show keygen result
      ansible.builtin.debug:
        var: keygen_result

    - name: Read private key
      ansible.builtin.slurp:
        src: "{{ key_path }}"
      register: private_key

    - name: Read public key
      ansible.builtin.slurp:
        src: "{{ key_path }}.pub"
      register: public_key

    - name: Save SSH key pair as workflow artifacts
      ansible.builtin.set_stats:
        data:
          key_name: "{{ key_name }}"
          ssh_private_key: "{{ private_key.content | b64decode }}"
          ssh_public_key: "{{ public_key.content | b64decode }}"
        per_host: false